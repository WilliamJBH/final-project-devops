version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - app_data:/app/data
    networks:
      - devops_network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - nginx_logs:/var/log/nginx
    networks:
      - devops_network
    depends_on:
      - web

volumes:
  app_data:
  nginx_logs:

networks:
  devops_network:
    driver: bridge
